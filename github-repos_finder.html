<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="apple-touch-icon" href="./GitHub-repo_finder-2048x2048.png"> 


  
  <title>windy003 的 GitHub 仓库</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #24292f;
      min-height: 100vh;
    }

    header {
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #d0d7de;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #24292f;
    }

    header h1 span {
      color: #0969da;
    }

    header .repo-count {
      margin-left: auto;
      font-size: 13px;
      color: #57606a;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 20px;
      padding: 3px 10px;
    }

    .search-bar {
      padding: 20px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #ffffff;
      border-bottom: 1px solid #d0d7de;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .search-wrap {
      position: relative;
      flex: 1;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #57606a;
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 9px 12px 9px 38px;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      color: #24292f;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus { border-color: #0969da; }

    #search.error { border-color: #cf222e; }

    .regex-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      padding: 8px 14px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      font-size: 13px;
      color: #57606a;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .regex-toggle:hover { border-color: #0969da; color: #24292f; }

    .regex-toggle.active {
      background: #ddf4ff;
      border-color: #0969da;
      color: #0969da;
    }

    .regex-toggle input { display: none; }

    .regex-label {
      font-family: monospace;
      font-size: 15px;
      font-weight: bold;
    }

    #error-msg {
      font-size: 12px;
      color: #f85149;
      padding: 0 24px 8px;
      display: none;
    }

    #error-msg.show { display: block; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .stats {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 16px;
    }

    .stats strong { color: #24292f; }

    .repo-grid {
      display: grid;
      gap: 12px;
    }

    .repo-card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, transform 0.1s;
      cursor: pointer;
    }

    .repo-card:hover {
      border-color: #0969da;
      transform: translateY(-1px);
    }

    .repo-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .repo-name {
      font-size: 15px;
      font-weight: 600;
      color: #0969da;
    }

    mark {
      background: #fff8c5;
      color: #7d4e00;
      border-radius: 2px;
      padding: 0 1px;
    }

    .repo-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid;
    }

    .badge.private {
      color: #9a6700;
      border-color: #d4a72c;
      background: #fff8c5;
    }

    .badge.public {
      color: #1a7f37;
      border-color: #82cfaa;
      background: #dafbe1;
    }

    .repo-desc {
      margin-top: 8px;
      font-size: 13px;
      color: #57606a;
      line-height: 1.6;
    }

    .repo-footer {
      margin-top: 12px;
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #57606a;
    }

    .repo-footer span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .release-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #1a7f37;
      background: #dafbe1;
      border: 1px solid #82cfaa;
      border-radius: 20px;
      padding: 2px 8px;
      text-decoration: none;
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      z-index: 1;
      position: relative;
    }
    .release-tag:hover {
      background: #aceebb;
      border-color: #56b87a;
    }

    .token-btn {
      padding: 8px 14px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      font-size: 13px;
      color: #57606a;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .token-btn:hover { border-color: #0969da; color: #24292f; }
    .token-btn.has-token { color: #1a7f37; border-color: #82cfaa; background: #dafbe1; }

    .token-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .token-modal-overlay.show { display: flex; }

    .token-modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 460px;
      max-width: 90vw;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .token-modal h3 { font-size: 16px; margin-bottom: 8px; }
    .token-modal p { font-size: 13px; color: #57606a; margin-bottom: 16px; line-height: 1.6; }
    .token-modal input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
      outline: none;
      margin-bottom: 16px;
    }
    .token-modal input:focus { border-color: #0969da; }
    .token-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .token-modal-actions button {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #d0d7de;
      background: #f6f8fa;
      color: #24292f;
      transition: background 0.2s;
    }
    .token-modal-actions button:hover { background: #eaeef2; }
    .token-modal-actions .save-btn { background: #2da44e; color: #fff; border-color: #2da44e; }
    .token-modal-actions .save-btn:hover { background: #218838; }
    .token-modal-actions .clear-btn { color: #cf222e; }

    .lang-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .empty-state, .loading, .fetch-error {
      text-align: center;
      padding: 80px 24px;
      color: #57606a;
    }

    .empty-state svg, .loading svg, .fetch-error svg {
      margin: 0 auto 16px;
      display: block;
      opacity: 0.4;
    }

    .loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #d0d7de;
      border-top-color: #0969da;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .fetch-error .retry-btn {
      margin-top: 16px;
      padding: 8px 20px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      color: #24292f;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    .fetch-error .retry-btn:hover { background: #eaeef2; }

    /* Language colors */
    .lang-JavaScript { background: #f1e05a; }
    .lang-TypeScript { background: #3178c6; }
    .lang-Python     { background: #3572A5; }
    .lang-HTML       { background: #e34c26; }
    .lang-CSS        { background: #563d7c; }
    .lang-Vue        { background: #41b883; }
    .lang-Go         { background: #00ADD8; }
    .lang-Rust       { background: #dea584; }
    .lang-Java       { background: #b07219; }
    .lang-C          { background: #555555; }
    .lang-Shell      { background: #89e051; }
    .lang-default    { background: #8b949e; }
  </style>
</head>
<body>

<header>
  <img id="avatar" src="" alt="avatar">
  <h1><span>windy003</span> 的 GitHub 仓库</h1>
  <div class="repo-count" id="repo-count">加载中...</div>
</header>

<form class="search-bar" autocomplete="off" onsubmit="return false">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/>
    </svg>
    <input type="search" id="search" name="repo-search" placeholder="搜索仓库名或描述..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-form-type="other" data-lpignore="true" data-1p-ignore>
  </div>
  <label class="regex-toggle" id="regex-toggle">
    <input type="checkbox" id="regex-check">
    <span class="regex-label">.*</span>
    <span>正则模式</span>
  </label>
  <button class="token-btn" id="token-btn" onclick="openTokenModal()">🔑 Token</button>
</form>
<div id="error-msg"></div>

<div class="token-modal-overlay" id="token-modal">
  <div class="token-modal">
    <h3>设置 GitHub Token</h3>
    <p>输入你的 Personal Access Token 以提升 API 限额（60 → 5000次/小时），并显示每个仓库最新的 Release 名称。<br>
    生成方式：GitHub → Settings → Developer settings → Personal access tokens → Generate new token (classic)，勾选 <code>public_repo</code> 权限。<br>
    Token 仅保存在浏览器本地，不会上传到任何服务器。</p>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    <div id="token-msg" style="font-size:13px;margin-bottom:12px;display:none"></div>
    <div class="token-modal-actions">
      <button class="clear-btn" onclick="clearToken()">清除 Token</button>
      <button onclick="closeTokenModal()">取消</button>
      <button class="save-btn" id="save-token-btn" onclick="saveToken()">保存</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="stats" id="stats"></div>
  <div class="repo-grid" id="repo-grid">
    <div class="loading">
      <div class="spinner"></div>
      <div>正在加载仓库数据...</div>
    </div>
  </div>
</div>

<script>
const USERNAME = 'windy003';
const API = `https://api.github.com/users/${USERNAME}`;
const TOKEN_KEY = 'github_pat_token';

let allRepos = [];

function getToken() {
  return localStorage.getItem(TOKEN_KEY) || '';
}

function apiHeaders() {
  const h = { Accept: 'application/vnd.github+json' };
  const token = getToken();
  if (token) h.Authorization = `Bearer ${token}`;
  return h;
}

function updateTokenBtn() {
  const btn = document.getElementById('token-btn');
  btn.classList.toggle('has-token', !!getToken());
  btn.textContent = getToken() ? '🔑 已认证' : '🔑 Token';
}

function openTokenModal() {
  document.getElementById('token-input').value = getToken();
  document.getElementById('token-modal').classList.add('show');
}

function closeTokenModal() {
  document.getElementById('token-modal').classList.remove('show');
}

async function saveToken() {
  const val = document.getElementById('token-input').value.trim();
  const msg = document.getElementById('token-msg');
  const btn = document.getElementById('save-token-btn');

  if (!val) {
    msg.style.display = 'block';
    msg.style.color = '#cf222e';
    msg.textContent = '请输入 Token';
    return;
  }

  // 验证 Token 是否有效
  btn.disabled = true;
  btn.textContent = '验证中...';
  msg.style.display = 'block';
  msg.style.color = '#57606a';
  msg.textContent = '正在验证 Token...';

  try {
    const r = await fetch('https://api.github.com/user', {
      headers: { Accept: 'application/vnd.github+json', Authorization: `Bearer ${val}` }
    });
    if (r.ok) {
      localStorage.setItem(TOKEN_KEY, val);
      closeTokenModal();
      updateTokenBtn();
      msg.style.display = 'none';
      location.reload();
    } else {
      msg.style.color = '#cf222e';
      msg.textContent = `Token 无效（${r.status}），请检查是否正确或已过期`;
    }
  } catch {
    msg.style.color = '#cf222e';
    msg.textContent = '网络错误，请检查网络连接';
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
}

function clearToken() {
  localStorage.removeItem(TOKEN_KEY);
  closeTokenModal();
  updateTokenBtn();
  location.reload();
}

const langColor = lang => {
  const cls = `lang-${lang}`;
  const known = ['JavaScript','TypeScript','Python','HTML','CSS','Vue','Go','Rust','Java','C','Shell'];
  return known.includes(lang) ? cls : 'lang-default';
};

const formatDate = iso => {
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' });
};

async function fetchAllRepos() {
  let repos = [], page = 1;
  while (true) {
    const r = await fetch(`${API}/repos?per_page=100&page=${page}&sort=updated`, {
      headers: apiHeaders()
    });
    if (!r.ok) throw new Error(`GitHub API 错误: ${r.status} ${r.statusText}`);
    const data = await r.json();
    repos = repos.concat(data);
    if (data.length < 100) break;
    page++;
  }
  return repos;
}

async function fetchAllReleases(repos) {
  // 先一次性获取每个仓库的 releases 列表（只取1条），用 Promise.allSettled 并行请求
  const promises = repos.map(repo =>
    fetch(`https://api.github.com/repos/${repo.full_name}/releases?per_page=1`, {
      headers: apiHeaders()
    }).then(r => {
      if (r.status === 403 || r.status === 429) return { rateLimited: true };
      if (!r.ok) return null;
      return r.json();
    }).then(data => {
      if (!data || data.rateLimited) return data;
      if (Array.isArray(data) && data.length > 0) {
        repo.latestRelease = { name: data[0].name || data[0].tag_name, url: data[0].html_url };
      }
      return data;
    }).catch(() => null)
  );
  await Promise.all(promises);
}

function highlight(text, pattern, isRegex) {
  if (!pattern) return escHtml(text);
  try {
    const re = isRegex ? new RegExp(pattern, 'gi') : new RegExp(escRegex(pattern), 'gi');
    return escHtml(text).replace(re.source ? re : new RegExp(escRegex(pattern), 'gi'),
      m => `<mark>${m}</mark>`
    );
  } catch { return escHtml(text); }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function renderRepos(repos, query, isRegex) {
  const grid = document.getElementById('repo-grid');
  const stats = document.getElementById('stats');

  if (!repos.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11 17.938A8.001 8.001 0 0 1 12 2a8 8 0 0 1 .062 15.938V20h1a1 1 0 0 1 0 2h-2a1 1 0 0 1-1-1v-3.062zM12 16a6 6 0 1 0 0-12 6 6 0 0 0 0 12zm-1-5h2v2h-2v-2zm0-6h2v4h-2V5z"/>
        </svg>
        <div>没有找到匹配的仓库</div>
      </div>`;
    stats.textContent = '';
    return;
  }

  stats.innerHTML = `共找到 <strong>${repos.length}</strong> 个仓库${query ? `，关键词：<strong>${escHtml(query)}</strong>` : ''}`;

  grid.innerHTML = repos.map(repo => {
    const name = highlight(repo.name, query, isRegex);
    const desc = repo.description ? highlight(repo.description, query, isRegex) : '<span style="opacity:.4">暂无描述</span>';
    const stars = repo.stargazers_count;
    const forks = repo.forks_count;
    const lang = repo.language;
    return `
      <div class="repo-card" data-url="${repo.html_url}" onclick="if(!event.target.closest('.release-tag')){window.open(this.dataset.url,'_blank')}">
        <div class="repo-header">
          <div class="repo-name">${name}</div>
          <div class="repo-meta">
            ${repo.latestRelease ? `<a class="release-tag" href="${escHtml(repo.latestRelease.url)}" target="_blank" rel="noopener" title="${escHtml(repo.latestRelease.name)}" onclick="event.stopPropagation()">🏷️ ${escHtml(repo.latestRelease.name)}</a>` : ''}
            <span class="badge ${repo.private ? 'private' : 'public'}">${repo.private ? '私有' : '公开'}</span>
          </div>
        </div>
        <div class="repo-desc">${desc}</div>
        <div class="repo-footer">
          ${lang ? `<span><span class="lang-dot ${langColor(lang)}"></span>${escHtml(lang)}</span>` : ''}
          ${stars ? `<span>★ ${stars}</span>` : ''}
          ${forks ? `<span>⑂ ${forks}</span>` : ''}
          <span style="margin-left:auto">更新于 ${formatDate(repo.updated_at)}</span>
        </div>
      </div>`;
  }).join('');
}

function filterAndRender() {
  const query = document.getElementById('search').value.trim();
  const isRegex = document.getElementById('regex-check').checked;
  const errMsg = document.getElementById('error-msg');
  const searchEl = document.getElementById('search');

  // Validate regex
  if (isRegex && query) {
    try { new RegExp(query); }
    catch (e) {
      errMsg.textContent = `正则表达式错误: ${e.message}`;
      errMsg.classList.add('show');
      searchEl.classList.add('error');
      return;
    }
  }
  errMsg.classList.remove('show');
  searchEl.classList.remove('error');

  if (!query) {
    renderRepos(allRepos, '', false);
    return;
  }

  const filtered = allRepos.filter(repo => {
    try {
      const re = isRegex ? new RegExp(query, 'i') : new RegExp(escRegex(query), 'i');
      return re.test(repo.name) || re.test(repo.description || '');
    } catch { return false; }
  });

  renderRepos(filtered, query, isRegex);
}

async function init() {
  updateTokenBtn();

  // Load avatar
  fetch(`${API}`, { headers: apiHeaders() }).then(r => r.json()).then(u => {
    document.getElementById('avatar').src = u.avatar_url;
  }).catch(() => {});

  try {
    allRepos = await fetchAllRepos();
    document.getElementById('repo-count').textContent = `${allRepos.length} 个仓库`;
    filterAndRender();
    // 有 Token 时才后台获取 release（无 Token 时配额太少）
    if (getToken()) {
      fetchAllReleases(allRepos).then(() => filterAndRender());
    }
  } catch (e) {
    document.getElementById('repo-grid').innerHTML = `
      <div class="fetch-error">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        <div>加载失败：${e.message}</div>
        <button class="retry-btn" onclick="location.reload()">重试</button>
      </div>`;
    document.getElementById('repo-count').textContent = '加载失败';
  }
}

// Events
document.getElementById('search').addEventListener('input', filterAndRender);

document.getElementById('regex-toggle').addEventListener('click', () => {
  const cb = document.getElementById('regex-check');
  cb.checked = !cb.checked;
  document.getElementById('regex-toggle').classList.toggle('active', cb.checked);
  filterAndRender();
});

function escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  // Alt+R: toggle regex mode
  if (e.altKey && !e.ctrlKey && !e.shiftKey && e.key === 'r') {
    e.preventDefault();
    const cb = document.getElementById('regex-check');
    cb.checked = !cb.checked;
    document.getElementById('regex-toggle').classList.toggle('active', cb.checked);
    filterAndRender();
  }

  // Ctrl+Shift+F: focus search box
  if (e.ctrlKey && e.shiftKey && e.key === 'F') {
    e.preventDefault();
    const searchEl = document.getElementById('search');
    searchEl.focus();
    searchEl.select();
  }
});

// 点击遮罩层关闭 Token 弹窗
document.getElementById('token-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeTokenModal();
});

init();
</script>
</body>
</html>
